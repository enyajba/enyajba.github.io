<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JBA ルールテスト フラッシュカード</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e1a">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2236;
    --orange: #ff6b2b;
    --orange2: #ff9f1c;
    --blue: #2563eb;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --correct: #22c55e;
    --wrong: #ef4444;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(10,14,26,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--orange), var(--orange2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .progress-wrap {
    flex: 1;
    margin: 0 20px;
  }

  .progress-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--orange2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    overflow-x: auto;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    font-weight: 700;
  }

  /* MAIN AREA */
  main {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }

  /* CARD */
  .card-scene {
    width: 100%;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 340px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    min-height: 220px;
    backface-visibility: hidden;
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    max-height: 340px;
  }

  .card-front {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
  }

  .card-back {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    transform: rotateY(180deg);
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    font-weight: 700;
    margin-bottom: 12px;
  }

  .card-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-question {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    flex: 1;
  }

  .card-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    text-align: center;
  }

  .answer-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 28px;
    font-weight: 900;
    padding: 6px 18px;
    border-radius: 8px;
    margin-bottom: 14px;
  }

  .answer-badge.correct {
    color: var(--correct);
    background: rgba(34, 197, 94, 0.1);
    border: 2px solid var(--correct);
  }

  .answer-badge.wrong {
    color: var(--wrong);
    background: rgba(239, 68, 68, 0.1);
    border: 2px solid var(--wrong);
  }

  .card-explanation {
    font-size: 12px;
    line-height: 1.7;
    color: #a0aec0;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 12px;
    margin-top: 12px;
    border-left: 3px solid var(--orange);
  }

  .card-ref {
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
  }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    color: white;
  }

  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); opacity: 0.9; }

  /* AUDIO PANEL */
  .audio-panel {
    width: 100%;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 18px;
  }

  .audio-title {
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--orange);
    font-weight: 700;
    margin-bottom: 14px;
  }

  .audio-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .audio-btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .audio-btn.playing {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }

  .audio-btn:hover { background: rgba(255,255,255,0.1); }
  .audio-btn.playing:hover { background: var(--orange); opacity: 0.85; }

  .speed-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
  }

  .speed-label { font-size: 11px; color: var(--muted); }

  .speed-btn {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .speed-btn.active {
    background: rgba(255,107,43,0.2);
    border-color: var(--orange);
    color: var(--orange);
  }

  .now-reading {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    padding: 8px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    min-height: 32px;
    line-height: 1.5;
  }

  /* FILTER */
  .filter-bar {
    width: 100%;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 6px 12px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }

  .filter-chip.on {
    background: rgba(37,99,235,0.2);
    border-color: var(--blue);
    color: #93c5fd;
  }

  /* STATS */
  .stats-row {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .stat-box {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
  }

  .stat-num.c { color: var(--correct); }
  .stat-num.w { color: var(--wrong); }
  .stat-num.t { color: var(--orange); }

  .stat-lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* NAV */
  .nav-row {
    display: flex;
    gap: 8px;
    width: 100%;
    align-items: center;
  }

  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.1); }

  .jump-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    text-align: center;
    outline: none;
  }

  .jump-input:focus { border-color: var(--orange); }

  /* SHUFFLE toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  .toggle-label { font-size: 12px; color: var(--muted); }

  .toggle {
    width: 36px;
    height: 20px;
    border-radius: 99px;
    background: rgba(255,255,255,0.1);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--orange); }

  .toggle::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    top: 3px;
    left: 3px;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 19px; }

  /* ANSWER TAP BUTTONS */
  .answer-tap-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    width: 100%;
  }

  .tap-btn {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: 2px solid transparent;
    font-size: 28px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tap-btn-maru {
    background: rgba(34,197,94,0.1);
    border-color: var(--correct);
    color: var(--correct);
  }

  .tap-btn-batu {
    background: rgba(239,68,68,0.1);
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .tap-btn:hover { opacity: 0.8; transform: scale(1.03); }
  .tap-btn:active { transform: scale(0.97); }

  .tap-btn.selected-correct {
    background: var(--correct);
    color: white;
  }

  .tap-btn.selected-wrong {
    background: var(--wrong);
    color: white;
  }

  .tap-result {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    display: none;
  }

  .tap-result.hit {
    background: rgba(34,197,94,0.15);
    color: var(--correct);
    border: 1px solid var(--correct);
    display: block;
  }

  .tap-result.miss {
    background: rgba(239,68,68,0.15);
    color: var(--wrong);
    border: 1px solid var(--wrong);
    display: block;
  }

  /* API KEY INPUT */
  .api-key-panel {
    width: 100%;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 4px;
  }

  .api-key-panel summary {
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
  }

  .api-key-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .api-key-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }

  .api-key-input:focus { border-color: var(--orange); }

  .api-save-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: var(--orange);
    color: white;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    white-space: nowrap;
  }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: rgba(255,107,43,0.15);
    color: var(--orange);
    border: 1px solid var(--orange);
    margin-left: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏀 JBA RULES</div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" onclick="setFilter('all')">全問 (175)</button>
  <button class="tab" onclick="setFilter('A')">難A</button>
  <button class="tab" onclick="setFilter('B')">難B</button>
  <button class="tab" onclick="setFilter('C')">難C</button>
  <button class="tab" onclick="setFilter('D')">難D</button>
  <button class="tab" onclick="setFilter('wrong_only')">✗のみ</button>
  <button class="tab" onclick="setFilter('correct_only')">○のみ</button>
</div>

<main>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num t" id="statTotal">0</div>
      <div class="stat-lbl">残り</div>
    </div>
    <div class="stat-box">
      <div class="stat-num c" id="statKnow">0</div>
      <div class="stat-lbl">わかった</div>
    </div>
    <div class="stat-box">
      <div class="stat-num w" id="statDunno">0</div>
      <div class="stat-lbl">要復習</div>
    </div>
  </div>

  <div class="toggle-row">
    <button class="toggle" id="shuffleToggle" onclick="toggleShuffle()"></button>
    <span class="toggle-label">シャッフル</span>
    <button class="toggle" id="filterUnseen" onclick="toggleUnseen()" style="margin-left:16px"></button>
    <span class="toggle-label">未回答のみ</span>
  </div>

  <!-- 〇×タップで答える -->
  <div class="card-scene" onclick="revealCard()" id="cardScene">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront">
        <div class="card-label">問題</div>
        <div class="card-num" id="cardNum">Q1</div>
        <div class="card-question" id="cardQuestion">読み込み中...</div>
        <div class="card-hint">〇か✕をタップ、またはカードをタップして答えを確認</div>
      </div>
      <div class="card-face card-back" id="cardBack">
        <div class="card-label">解答</div>
        <div id="answerBadge" class="answer-badge correct">○</div>
        <div class="card-question" id="cardQuestionBack"></div>
        <div class="card-explanation" id="cardExplanation" style="display:none"></div>
        <div class="card-ref" id="cardRef"></div>
      </div>
    </div>
  </div>

  <div class="answer-tap-row" id="tapRow">
    <button class="tap-btn tap-btn-maru" id="tapMaru" onclick="tapAnswer('○')">〇</button>
    <button class="tap-btn tap-btn-batu" id="tapBatu" onclick="tapAnswer('×')">✕</button>
  </div>
  <div class="tap-result" id="tapResult"></div>

  <div class="btn-row" id="nextBtnRow" style="display:none">
    <button class="btn btn-secondary" onclick="markDunno()">😰 要復習</button>
    <button class="btn btn-primary" onclick="markKnow()">👍 わかった・次へ</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevCard()">‹</button>
    <input class="jump-input" type="number" id="jumpInput" placeholder="番号で移動" min="1" onchange="jumpTo(this.value)">
    <button class="nav-btn" onclick="nextCard()">›</button>
  </div>

  <!-- AUDIO PANEL -->
  <div class="audio-panel">
    <div class="audio-title">🔊 音声読み上げ（運転中学習）<span class="ai-badge" id="aiBadge">🤖 AI整形OFF</span></div>
    <details class="api-key-panel">
      <summary>⚙️ Claude APIキー設定（自然な読み上げ用）</summary>
      <div class="api-key-row">
        <input class="api-key-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
        <button class="api-save-btn" onclick="saveApiKey()">保存</button>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:6px;">設定するとClaudeが読み上げ文章を自然に整形します。キーはこのデバイスのみに保存されます。</div>
    </details>
    <div class="audio-controls">
      <button class="audio-btn" id="btnRead" onclick="readCurrent()">現在の問題を読む</button>
      <button class="audio-btn" id="btnAuto" onclick="toggleAuto()">▶ 自動連続再生</button>
      <button class="audio-btn" id="btnStop" onclick="stopSpeech()">⏹ 停止</button>
    </div>
    <div class="speed-row">
      <span class="speed-label">速度：</span>
      <button class="speed-btn active" onclick="setSpeed(0.8, this)">0.8x</button>
      <button class="speed-btn" onclick="setSpeed(1.0, this)">1.0x</button>
      <button class="speed-btn" onclick="setSpeed(1.2, this)">1.2x</button>
      <button class="speed-btn" onclick="setSpeed(1.5, this)">1.5x</button>
    </div>
    <div class="now-reading" id="nowReading">待機中...</div>
  </div>

</main>

<script>
// ============================================================
// DATA (175問)
// ============================================================
const ALL_CARDS = [
{"id":1,"q":"ゲームに関わる全ての人物（テーブルオフィシャルズ等）は、訂正のできる誤りを認識した場合、ただちに審判に知らせることが求められる。","a":"○","diff":"D","ref":"ルール 1-2","exp":""},
{"id":2,"q":"チームが防御するバスケットを「相手チームのバスケット」といい、チームが攻撃するバスケットを「自チームのバスケット」という。","a":"×","diff":"D","ref":"ルール 1-3","exp":"チームが攻撃するバスケットを「相手チームのバスケット」といい、防御するバスケットを「自チームのバスケット」という。"},
{"id":3,"q":"センターラインはフロントコートの一部である。","a":"×","diff":"D","ref":"ルール 2-5-2","exp":"センターラインはバックコートの一部である。"},
{"id":4,"q":"スローインラインとは、近い方のエンドラインの内側の縁から8.325mの距離に、コートの外側に向かってサイドラインと直角に引いた、長さ0.15ｍの４本のラインをいう。","a":"○","diff":"C","ref":"ルール 2-5-6","exp":"２本→４本に変更となった"},
{"id":5,"q":"バスケットボールのゲームを行うときには、タイムアウトの時間をはかるためのストップウォッチ、あるいはゲームクロックとは別のよく見える適切な表示装置が用意されていなければならない。","a":"○","diff":"D","ref":"第３条","exp":""},
{"id":6,"q":"競技時間中、５個のファウルを宣せられたチームメンバーは、以降そのゲームに出場することはできないが、チームベンチに座ることは許される。","a":"○","diff":"D","ref":"ルール 4-1-3","exp":""},
{"id":7,"q":"プレーのインターバル中は、プレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。","a":"○","diff":"B","ref":"ルール 4-1-4","exp":""},
{"id":8,"q":"番号は0、00および1から99のいずれかを用いるが、同一チーム内において、「0」と「00」は同時に使用することができない。","a":"×","diff":"C","ref":"ルール 4-3-2","exp":"「0」と「00」は同時に使用することができる。"},

{"id":129,"q":"B１がシューターのA１にアンスポーツマンライクファウルをした。ボールが空中にある間にショットクロックのブザーが鳴り、ボールはリングに触れなかった。チームAのショットクロックバイオレーションはB１のアンスポーツマンライクファウルの後で起きたため、A１に２本のフリースローを与え、ゲームはショットクロックバイオレーション地点からチームBのスローインで再開される。","a":"×","diff":"B","ref":"インプリ 42-2","exp":"チームAのショットクロックバイオレーションはなかったものとする。誰もリバウンドに着かずに２本のフリースローがA１に与えられる。ゲームはフロントコートのスコアラーズテーブル反対側のスローインラインからチームAのスローインで再開される。ショットクロックは14秒となる。"},
{"id":130,"q":"ショット成功のA１にB１がパーソナルファウル。その後チームAのベンチにテクニカルファウル。審判はA１のゴール後、チームBのヘッドコーチ指定のプレーヤーに１本、次にA１に１本のフリースローを与えた。","a":"×","diff":"B","ref":"インプリ 42-5","exp":"両方のファウルの罰則は等しく、相殺される。いずれのフリースローも行われず、ゲームは通常のゴール成功後と同様に再開される。"},

{"id":133,"q":"抗争につながりそうな状況が起こり、A６がコートに入ったが積極的に関わらなかった。A６は失格・退場となる。チームAのヘッドコーチはテクニカルファウルを宣せられ「B２」と記入される。テクニカルファウルにより２本のフリースローがチームBに与えられ、２本のフリースローがA１に与えられ、最後のフリースロー後と同様に再開される。","a":"×","diff":"B","ref":"インプリ 42-14,42-15","exp":"誰もリバウンドに着かずに２本のフリースローがA１に与えられ、テクニカルファウルにより２本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブル反対側のスローインラインからチームBのスローインで再開される。ショットクロックは14秒となる。"},

// ============================================================
// STATE
// ============================================================
let state = {
  filter: 'all',
  shuffle: false,
  unseenOnly: false,
  deck: [],
  index: 0,
  flipped: false,
  results: {}, // id -> 'know' | 'dunno'
  know: 0,
  dunno: 0,
  speed: 0.8,
  autoPlay: false,
  autoTimer: null,
};

function buildDeck() {
  let cards = ALL_CARDS.filter(c => c.id !== 119 && c.id !== 174);
  
  if (state.filter === 'A') cards = cards.filter(c => c.diff === 'A');
  else if (state.filter === 'B') cards = cards.filter(c => c.diff === 'B');
  else if (state.filter === 'C') cards = cards.filter(c => c.diff === 'C');
  else if (state.filter === 'D') cards = cards.filter(c => c.diff === 'D');
  else if (state.filter === 'wrong_only') cards = cards.filter(c => c.a === '×');
  else if (state.filter === 'correct_only') cards = cards.filter(c => c.a === '○');

  if (state.unseenOnly) {
    cards = cards.filter(c => !state.results[c.id]);
  }

  if (state.shuffle) {
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
  }

  state.deck = cards;
  state.index = 0;
  state.flipped = false;
}

function renderCard() {
  const card = state.deck[state.index];
  if (!card) return;

  // front
  document.getElementById('cardNum').textContent = `Q${card.id}　難度：${card.diff}`;
  document.getElementById('cardQuestion').textContent = card.q;

  // back
  const badge = document.getElementById('answerBadge');
  badge.textContent = card.a;
  badge.className = 'answer-badge ' + (card.a === '○' ? 'correct' : 'wrong');
  document.getElementById('cardQuestionBack').textContent = card.q;

  const expEl = document.getElementById('cardExplanation');
  if (card.exp) {
    expEl.textContent = '解説：' + card.exp;
    expEl.style.display = 'block';
  } else {
    expEl.style.display = 'none';
  }
  document.getElementById('cardRef').textContent = card.ref ? '参照：' + card.ref : '';

  // reset tap state
  state.flipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('tapMaru').classList.remove('selected-correct','selected-wrong');
  document.getElementById('tapBatu').classList.remove('selected-correct','selected-wrong');
  document.getElementById('tapResult').className = 'tap-result';
  document.getElementById('tapResult').textContent = '';
  document.getElementById('tapRow').style.opacity = '1';
  document.getElementById('tapRow').style.pointerEvents = 'auto';
  document.getElementById('nextBtnRow').style.display = 'none';

  // progress
  const total = state.deck.length;
  const pct = total ? ((state.index + 1) / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${state.index + 1} / ${total}`;

  // stats
  document.getElementById('statTotal').textContent = total - (state.know + state.dunno);
  document.getElementById('statKnow').textContent = state.know;
  document.getElementById('statDunno').textContent = state.dunno;
}

function tapAnswer(choice) {
  if (state.flipped) return;
  const card = state.deck[state.index];
  const correct = card.a;
  const isCorrect = choice === correct;

  // flip card
  state.flipped = true;
  document.getElementById('cardInner').classList.add('flipped');

  // highlight button
  const maruBtn = document.getElementById('tapMaru');
  const batuBtn = document.getElementById('tapBatu');
  if (choice === '○') {
    maruBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
  } else {
    batuBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
  }

  // show result
  const res = document.getElementById('tapResult');
  if (isCorrect) {
    res.textContent = '✅ 正解！';
    res.className = 'tap-result hit';
  } else {
    res.textContent = `❌ 不正解。正解は「${correct === '○' ? 'マル' : 'バツ'}」`;
    res.className = 'tap-result miss';
  }

  // disable tap row
  document.getElementById('tapRow').style.opacity = '0.5';
  document.getElementById('tapRow').style.pointerEvents = 'none';
  document.getElementById('nextBtnRow').style.display = 'flex';
}

function revealCard() {
  if (state.flipped) return;
  state.flipped = true;
  document.getElementById('cardInner').classList.add('flipped');
  document.getElementById('tapRow').style.opacity = '0.5';
  document.getElementById('tapRow').style.pointerEvents = 'none';
  document.getElementById('nextBtnRow').style.display = 'flex';
}

function nextCard() {
  if (state.index < state.deck.length - 1) {
    state.index++;
    state.flipped = false;
    renderCard();
  }
}

function prevCard() {
  if (state.index > 0) {
    state.index--;
    state.flipped = false;
    renderCard();
  }
}

function markKnow() {
  const card = state.deck[state.index];
  if (!state.results[card.id]) state.know++;
  state.results[card.id] = 'know';
  nextCard();
}

function markDunno() {
  const card = state.deck[state.index];
  if (!state.results[card.id]) state.dunno++;
  state.results[card.id] = 'dunno';
  nextCard();
}

function jumpTo(val) {
  const n = parseInt(val);
  if (!isNaN(n) && n >= 1 && n <= state.deck.length) {
    state.index = n - 1;
    state.flipped = false;
    renderCard();
  }
}

function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  buildDeck();
  renderCard();
}

function toggleShuffle() {
  state.shuffle = !state.shuffle;
  document.getElementById('shuffleToggle').classList.toggle('on', state.shuffle);
  buildDeck();
  renderCard();
}

function toggleUnseen() {
  state.unseenOnly = !state.unseenOnly;
  document.getElementById('filterUnseen').classList.toggle('on', state.unseenOnly);
  buildDeck();
  renderCard();
}

// ============================================================
// API KEY
// ============================================================
let apiKey = localStorage.getItem('claude_api_key') || '';

function saveApiKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('claude_api_key', apiKey);
  document.getElementById('aiBadge').textContent = apiKey ? '🤖 AI整形ON' : '🤖 AI整形OFF';
  alert(apiKey ? 'APIキーを保存しました！次回から自然な読み上げになります。' : 'APIキーを削除しました。');
}

// ============================================================
// SPEECH
// ============================================================
function naturalizeText(card) {
  // 記号を読みやすく変換
  let q = card.q
    .replace(/A(\d+)/g, 'エー$1')
    .replace(/B(\d+)/g, 'ビー$1')
    .replace(/１/g, 'いち').replace(/２/g, 'に').replace(/３/g, 'さん')
    .replace(/４/g, 'よん').replace(/５/g, 'ご').replace(/６/g, 'ろく')
    .replace(/７/g, 'なな').replace(/８/g, 'はち').replace(/９/g, 'きゅう')
    .replace(/０/g, 'ぜろ');
  const ans = card.a === '○' ? 'マル' : 'バツ';
  const exp = card.exp
    ? card.exp.replace(/A(\d+)/g, 'エー$1').replace(/B(\d+)/g, 'ビー$1')
    : '';
  return `問題${card.id}。${q}。　正解は、${ans}です。${exp ? '解説。' + exp : ''}`;
}

async function buildTextWithAI(card) {
  if (!apiKey) return naturalizeText(card);
  try {
    document.getElementById('nowReading').textContent = 'AI整形中...';
    const prompt = `以下のバスケットボール審判ルールテストの問題と答えを、車の運転中に聞いても自然に理解できる読み上げ文章に変換してください。
・記号（A１、B２など）は「エーいち」「ビーに」と読む
・「○」は「マル」、「×」は「バツ」と読む
・問題番号から始め、問題文→正解→解説の順で自然な日本語にする
・余分な説明や前置きは不要。読み上げ文章のみ出力。

問題${card.id}：${card.q}
正解：${card.a === '○' ? 'マル' : 'バツ'}
解説：${card.exp || 'なし'}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.content && data.content[0]) {
      return data.content[0].text;
    }
  } catch(e) {
    console.error('AI整形失敗:', e);
  }
  return naturalizeText(card);
}

async function readCurrent() {
  stopSpeech();
  const card = state.deck[state.index];
  if (!card) return;
  document.getElementById('nowReading').textContent = `読み上げ準備中：問題${card.id}`;
  const text = await buildTextWithAI(card);
  document.getElementById('nowReading').textContent = `読み上げ中：問題${card.id}`;
  speak(text);
}

function speak(text, onEnd) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = state.speed;
  utter.onend = onEnd || null;
  speechSynthesis.speak(utter);
}

function stopSpeech() {
  speechSynthesis.cancel();
  state.autoPlay = false;
  document.getElementById('btnAuto').textContent = '▶ 自動連続再生';
  document.getElementById('btnAuto').classList.remove('playing');
  document.getElementById('nowReading').textContent = '停止中';
}

function toggleAuto() {
  if (state.autoPlay) {
    stopSpeech();
  } else {
    state.autoPlay = true;
    document.getElementById('btnAuto').textContent = '⏸ 停止';
    document.getElementById('btnAuto').classList.add('playing');
    autoNext();
  }
}

async function autoNext() {
  if (!state.autoPlay) return;
  const card = state.deck[state.index];
  if (!card) { stopSpeech(); return; }
  document.getElementById('nowReading').textContent = `問題${card.id}を準備中... (${state.index + 1}/${state.deck.length})`;
  state.flipped = false;
  renderCard();
  const text = await buildTextWithAI(card);
  if (!state.autoPlay) return;
  document.getElementById('nowReading').textContent = `問題${card.id}を読み上げ中... (${state.index + 1}/${state.deck.length})`;
  speak(text, () => {
    if (!state.autoPlay) return;
    if (state.index < state.deck.length - 1) {
      state.index++;
      setTimeout(() => autoNext(), 600);
    } else {
      stopSpeech();
      document.getElementById('nowReading').textContent = '全問読み上げ完了！';
    }
  });
}

function setSpeed(s, btn) {
  state.speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

}
buildDeck();
renderCard();
